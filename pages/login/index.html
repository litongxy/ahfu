<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手机号登录 - 同仁堂</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    .auth-card {
      padding: 16px;
      border-radius: 18px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-sm);
    }

    .auth-mode-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode-btn {
      min-height: 36px;
      border-radius: 999px;
      border: 1px solid var(--border-default);
      background: var(--bg-muted);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 700;
    }

    .mode-btn.is-active {
      background: rgba(95, 159, 69, 0.14);
      border-color: rgba(95, 159, 69, 0.34);
      color: var(--brand-700);
    }

    .auth-tips {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .auth-error {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--danger-50);
      color: var(--danger-600);
      font-size: 12px;
      line-height: 1.5;
    }

    .auth-success {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--success-50);
      color: var(--success-600);
      font-size: 12px;
      line-height: 1.5;
    }

    .auth-submit-btn {
      margin-top: 14px;
    }
  </style>
</head>
<body class="is-transparent">
  <div class="page-shell">
    <div class="page-body page-stack">
      <header class="page-hero">
        <div class="topbar">
          <a href="/pages/profile/index.html" class="back-link">返回</a>
          <span class="hero-action">手机号 + 密码</span>
        </div>
        <div class="hero-copy">
          <div class="eyebrow">Account Login</div>
          <h1 class="hero-title">登录你的健康账号</h1>
          <p class="hero-subtitle">登录后会自动关联你的健康档案、体检报告和咨询数据。</p>
        </div>
      </header>

      <section class="auth-card">
        <div class="auth-mode-switch">
          <button type="button" class="mode-btn is-active" id="loginModeBtn">登录</button>
          <button type="button" class="mode-btn" id="registerModeBtn">注册</button>
        </div>

        <form id="authForm">
          <div class="field">
            <label class="field-label" for="phoneInput">手机号</label>
            <input id="phoneInput" class="input" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入 11 位手机号" required>
          </div>

          <div class="field">
            <label class="field-label" for="passwordInput">密码</label>
            <input id="passwordInput" class="input" type="password" minlength="6" placeholder="请输入密码（至少 6 位）" required>
          </div>

          <button class="btn auth-submit-btn" id="submitBtn" type="submit">登录</button>
        </form>

        <div class="auth-tips">首次使用请切换到注册，成功后会自动登录当前手机号账号。</div>
        <div id="authError" class="auth-error" hidden></div>
        <div id="authSuccess" class="auth-success" hidden></div>
      </section>
    </div>
  </div>

  <script src="/scripts/auth-client.js"></script>
  <script>
    let mode = 'login';

    function getRedirectPath() {
      const params = new URLSearchParams(window.location.search);
      const target = params.get('redirect');
      if (!target || typeof target !== 'string') {
        return '/pages/profile/index.html';
      }

      if (!target.startsWith('/')) {
        return '/pages/profile/index.html';
      }

      if (target.startsWith('/pages/login/index.html')) {
        return '/pages/profile/index.html';
      }

      return target;
    }

    function setMode(nextMode) {
      mode = nextMode;
      const isLogin = mode === 'login';
      document.getElementById('loginModeBtn').classList.toggle('is-active', isLogin);
      document.getElementById('registerModeBtn').classList.toggle('is-active', !isLogin);
      document.getElementById('submitBtn').textContent = isLogin ? '登录' : '注册并登录';
      hideStatus();
    }

    function hideStatus() {
      const errorEl = document.getElementById('authError');
      const successEl = document.getElementById('authSuccess');
      errorEl.hidden = true;
      successEl.hidden = true;
      errorEl.textContent = '';
      successEl.textContent = '';
    }

    function showError(message) {
      const errorEl = document.getElementById('authError');
      const successEl = document.getElementById('authSuccess');
      successEl.hidden = true;
      errorEl.hidden = false;
      errorEl.textContent = message;
    }

    function showSuccess(message) {
      const errorEl = document.getElementById('authError');
      const successEl = document.getElementById('authSuccess');
      errorEl.hidden = true;
      successEl.hidden = false;
      successEl.textContent = message;
    }

    function sanitizePhone(raw) {
      return String(raw || '').replace(/\D/g, '');
    }

    function lockSubmit(locked) {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = locked;
      submitBtn.textContent = locked
        ? (mode === 'login' ? '登录中...' : '注册中...')
        : (mode === 'login' ? '登录' : '注册并登录');
    }

    async function submitAuth(event) {
      event.preventDefault();
      hideStatus();

      if (!window.AcpAuth) {
        showError('登录模块未加载，请刷新页面重试');
        return;
      }

      const phone = sanitizePhone(document.getElementById('phoneInput').value);
      const password = document.getElementById('passwordInput').value || '';

      if (!/^1\d{10}$/.test(phone)) {
        showError('请输入正确的 11 位手机号');
        return;
      }

      if (password.trim().length < 6) {
        showError('密码至少 6 位');
        return;
      }

      lockSubmit(true);
      try {
        if (mode === 'login') {
          await window.AcpAuth.loginWithPhonePassword(phone, password);
        } else {
          await window.AcpAuth.registerWithPhonePassword(phone, password);
        }

        showSuccess('登录成功，正在跳转...');
        window.setTimeout(function () {
          window.location.href = getRedirectPath();
        }, 320);
      } catch (error) {
        const message = error && error.message ? error.message : '操作失败，请稍后重试';
        showError(message);
      } finally {
        lockSubmit(false);
      }
    }

    function bindEvents() {
      document.getElementById('loginModeBtn').addEventListener('click', function () {
        setMode('login');
      });

      document.getElementById('registerModeBtn').addEventListener('click', function () {
        setMode('register');
      });

      document.getElementById('authForm').addEventListener('submit', submitAuth);
    }

    async function bootstrap() {
      bindEvents();

      if (window.AcpAuth && typeof window.AcpAuth.ensurePhoneLogin === 'function') {
        try {
          await window.AcpAuth.ensurePhoneLogin({ redirect: false });
          window.location.href = getRedirectPath();
          return;
        } catch (error) {
          // Keep current page and allow login/register.
        }
      }
    }

    bootstrap();
  </script>
</body>
</html>
