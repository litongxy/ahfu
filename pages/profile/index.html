<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 - 同仁堂</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    body { background: transparent; }
    .header { 
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%); 
      color: white; 
      padding: 36px 20px; 
      border-radius: 0 0 32px 32px;
      box-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .avatar { 
      width: 80px; 
      height: 80px; 
      background: linear-gradient(135deg, #fff 0%, #f5f5f5 100%);
      border-radius: 50%; 
      margin: 0 auto 16px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 36px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      position: relative;
    }
    .header h1 { text-align: center; font-size: 20px; margin-bottom: 6px; font-weight: 600; }
    .header p { text-align: center; font-size: 13px; opacity: 0.9; }
    .stats { 
      display: flex; 
      justify-content: space-around; 
      padding: 24px 20px; 
      background: white; 
      margin: 16px; 
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .stat { text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; color: #c41e3a; }
    .stat-label { font-size: 13px; color: #9e9e9e; margin-top: 4px; }
    .menu { 
      background: white; 
      margin: 0 16px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .menu-item { 
      display: flex; 
      align-items: center; 
      padding: 18px 20px; 
      border-bottom: 1px solid #f5f5f5; 
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-item:hover { background: #fafafa; }
    .menu-item:last-child { border-bottom: none; }
    .menu-icon { 
      font-size: 22px; 
      margin-right: 16px; 
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-text { flex: 1; font-size: 16px; font-weight: 500; }
    .menu-arrow { color: #bdbdbd; font-size: 18px; }
    .logout-btn { 
      display: block; 
      width: calc(100% - 32px); 
      margin: 20px 16px; 
      padding: 16px; 
      background: white; 
      border: 2px solid #c41e3a; 
      color: #c41e3a; 
      border-radius: 28px; 
      text-align: center; 
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .logout-btn:hover { 
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      color: white;
    }
    .section-title { 
      padding: 20px 20px 12px; 
      font-size: 14px; 
      color: #9e9e9e; 
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
