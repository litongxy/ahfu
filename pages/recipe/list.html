<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康食谱 - 同仁堂</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    body { padding: 0; background: transparent; }
    .header { 
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%); 
      color: white; 
      padding: 24px 20px; 
      border-radius: 0 0 28px 28px; 
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
    }
    .header h1 { font-size: 22px; margin-bottom: 6px; }
    .header p { font-size: 13px; opacity: 0.9; }
    .back-btn { 
      background: rgba(255,255,255,0.2); 
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white; 
      padding: 10px 18px; 
      border-radius: 20px; 
      font-size: 14px; 
      margin-bottom: 12px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); transform: translateX(-4px); }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; margin: 0 16px 16px 16px; overflow-x: auto; padding-bottom: 4px; }
    .tab { 
      padding: 10px 20px; 
      background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
      border-radius: 20px; 
      font-size: 14px; 
      white-space: nowrap; 
      cursor: pointer; 
      border: none;
      transition: all 0.3s ease;
    }
    .tab.active { 
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%); 
      color: white;
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .card { 
      background: white; 
      border-radius: 16px; 
      padding: 16px; 
      margin: 0 16px 16px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08); 
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .recipe-img { 
      width: 100%; 
      height: 160px; 
      border-radius: 12px; 
      margin-bottom: 14px; 
      object-fit: cover; 
      background: linear-gradient(135deg, #e0e0e0 0%, #bdbdbd 100%);
    }
    .recipe-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .recipe-desc { font-size: 14px; color: #616161; margin-bottom: 12px; }
    .recipe-info { display: flex; gap: 16px; font-size: 13px; color: #9e9e9e; }
    .recipe-tag { 
      display: inline-block; 
      padding: 4px 10px; 
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); 
      color: #e65100; 
      border-radius: 12px; 
      font-size: 12px; 
      margin-right: 6px;
      font-weight: 500;
    }
    .loading { text-align: center; padding: 40px; color: #999; }
    .no-more { text-align: center; padding: 20px; color: #bbb; font-size: 14px; }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: white;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      color: white;
      padding: 20px;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .modal-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }
    .modal-body { padding: 20px; }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #c41e3a;
      margin: 16px 0 10px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid #ffebee;
    }
    .section-title:first-child { margin-top: 0; }
    .ingredient-list { list-style: none; padding: 0; margin: 0; }
    .ingredient-list li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #333;
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .step-list { list-style: none; padding: 0; margin: 0; counter-reset: step; }
    .step-list li {
      padding: 12px 0 12px 40px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #333;
      position: relative;
      line-height: 1.6;
    }
    .step-list li:last-child { border-bottom: none; }
    .step-list li::before {
      counter-increment: step;
      content: counter(step);
      position: absolute;
      left: 0;
      top: 12px;
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #c41e3a 0%, #d32f2f 100%);
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 26px;
      font-size: 13px;
      font-weight: 600;
    }
    .modal-footer {
      padding: 15px 20px;
      background: #f9f9f9;
      border-radius: 0 0 20px 20px;
      text-align: center;
    }
    .modal-btn {
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/chat.html" class="back-btn">← 返回</a>
    <h1>🍽️ 健康食谱</h1>
    <p>根据您的体质推荐健康美食</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="all">全部</button>
    <button class="tab" data-type="汤类">养生汤</button>
    <button class="tab" data-type="药膳">药膳</button>
    <button class="tab" data-type="家常菜">家常菜</button>
    <button class="tab" data-type="素食">素食</button>
    <button class="tab" data-type="早餐">早餐</button>
  </div>

  <div id="recipeList"></div>
  <div class="no-more">— 已加载全部100道食谱 —</div>

  <div style="height: 60px;"></div>

  <script src="/data/recipes.js"></script>
  <script>
    const container = document.getElementById('recipeList');
    let currentType = 'all';
    const pageSize = 20;
    let loadedCount = 0;
    
    function renderRecipes(recipesToShow) {
      if (loadedCount >= recipesToShow.length) return;
      
      const end = Math.min(loadedCount + pageSize, recipesToShow.length);
      const recipesToRender = recipesToShow.slice(loadedCount, end);
      
      recipesToRender.forEach((recipe, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = recipe.id;
        card.innerHTML = `
          <img src="${recipe.img}" class="recipe-img" alt="${recipe.name}" onerror="this.style.background='linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)'">
          <div class="recipe-title">${recipe.name}</div>
          <div class="recipe-desc">${recipe.desc}</div>
          <div class="recipe-info">
            <span>🕐 ${recipe.time}</span>
            <span>🔥 ${recipe.cal}千卡</span>
          </div>
          <div style="margin-top: 10px;">
            ${recipe.tags.map(tag => `<span class="recipe-tag">${tag}</span>`).join('')}
          </div>
        `;
        card.addEventListener('click', () => showRecipeDetail(recipe));
        container.appendChild(card);
      });
      
      loadedCount = end;
    }
    
    function filterAndRender(type) {
      currentType = type;
      loadedCount = 0;
      container.innerHTML = '';
      
      const filtered = type === 'all' 
        ? recipes 
        : recipes.filter(r => r.type === type);
      
      renderRecipes(filtered);
    }
    
    function showRecipeDetail(recipe) {
      const existing = document.querySelector('.modal-overlay');
      if (existing) existing.remove();
      
      const hasDetail = recipe.ingredients && recipe.steps;
      
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <h2>${recipe.name}</h2>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          </div>
          <div class="modal-body">
            ${hasDetail ? `
              <div class="section-title">🥬 食材</div>
              <ul class="ingredient-list">
                ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
              </ul>
              <div class="section-title">👨‍🍳 做法</div>
              <ol class="step-list">
                ${recipe.steps.map(s => `<li>${s}</li>`).join('')}
              </ol>
            ` : `
              <div style="text-align: center; padding: 40px 20px; color: #666;">
                <p style="font-size: 48px; margin-bottom: 20px;">🍳</p>
                <p>暂无详细做法</p>
                <p style="font-size: 13px; margin-top: 10px;">尽情期待更新...</p>
              </div>
            `}
          </div>
          <div class="modal-footer">
            <button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">我知道了</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          modal.remove();
        }
      });
    }
    
    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        filterAndRender(this.dataset.type);
      });
    });
    
    // 滚动加载更多
    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
        const filtered = currentType === 'all' 
          ? recipes 
          : recipes.filter(r => r.type === currentType);
        renderRecipes(filtered);
      }
    });
    
    // 初始加载
    filterAndRender('all');
  </script>
</body>
</html>
