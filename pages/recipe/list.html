<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康食谱 - 同仁堂</title>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    .recipe-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .recipe-topic-chip {
      display: flex;
      width: fit-content;
      min-height: 24px;
      margin: 0 auto 10px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 10.5px;
      line-height: 1;
    }

    .recipe-stat {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .recipe-stat strong {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }

    .recipe-stat span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(248, 255, 246, 0.8);
    }

    .recipe-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 98px;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }

    .recipe-card__title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .recipe-card__desc {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .recipe-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .recipe-card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .recipe-card__thumb {
      width: 98px;
      height: 98px;
      border-radius: 14px;
      object-fit: cover;
      background: var(--bg-muted);
    }

    .no-more {
      padding: 6px 0 14px;
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 14px 10px;
      background: rgba(10, 16, 11, 0.5);
      backdrop-filter: blur(14px) saturate(1.05);
    }

    .sheet-card {
      width: min(100%, 440px);
      max-height: calc(100vh - 24px);
      overflow: hidden;
      border-radius: 24px;
      background: var(--bg-elevated);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 26px 54px rgba(19, 30, 20, 0.36);
    }

    .sheet-cover {
      position: relative;
      height: 178px;
      overflow: hidden;
      background:
        radial-gradient(circle at 88% 12%, rgba(180, 233, 156, 0.26), transparent 42%),
        linear-gradient(140deg, rgba(88, 145, 62, 0.96), rgba(56, 102, 42, 0.96));
    }

    .sheet-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.03);
      filter: saturate(1.08) contrast(1.03);
    }

    .sheet-cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 78%, rgba(188, 236, 165, 0.2), transparent 40%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.08), transparent 34%);
      pointer-events: none;
      z-index: 1;
    }

    .sheet-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 16, 11, 0.08) 0%, rgba(10, 16, 11, 0.24) 44%, rgba(10, 16, 11, 0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .sheet-head {
      position: absolute;
      inset: auto 16px 12px;
      z-index: 2;
      color: #f8fff6;
    }

    .sheet-head .chip-row {
      gap: 7px;
    }

    .sheet-head .chip {
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.16);
      color: #f4ffef;
      backdrop-filter: blur(14px);
    }

    .sheet-head h2 {
      margin-top: 8px;
      font-size: clamp(28px, 6.2vw, 36px);
      line-height: 1.08;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 2px rgba(9, 14, 10, 0.18);
    }

    .sheet-head p {
      margin-top: 8px;
      max-width: 96%;
      font-size: 14px;
      line-height: 1.45;
      color: rgba(244, 255, 239, 0.94);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 0 1px 1px rgba(9, 14, 10, 0.14);
    }

    .sheet-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(42, 84, 39, 0.56);
      color: #f6fff2;
      font-size: 29px;
      line-height: 1;
      font-weight: 300;
      backdrop-filter: blur(16px);
      transition: transform var(--duration-fast) var(--ease-out), background-color var(--duration-base) var(--ease-out);
    }

    .sheet-close:active {
      transform: scale(0.96);
    }

    @media (hover: hover) and (pointer: fine) {
      .sheet-close:hover {
        background: rgba(63, 112, 50, 0.66);
      }
    }

    .sheet-body {
      max-height: calc(100vh - 214px);
      overflow-y: auto;
      padding: 14px;
    }

    .sheet-section + .sheet-section {
      margin-top: 16px;
    }

    .sheet-section h3 {
      font-size: 15px;
      font-weight: 700;
    }

    .sheet-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sheet-list li {
      list-style: none;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--bg-muted);
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 13px;
    }

    .step-list {
      counter-reset: step;
    }

    .step-list li {
      position: relative;
      padding-left: 40px;
    }

    .step-list li::before {
      counter-increment: step;
      content: counter(step);
      position: absolute;
      left: 12px;
      top: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brand-600);
      color: var(--text-on-brand);
      text-align: center;
      line-height: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .recipe-card {
        grid-template-columns: minmax(0, 1fr) 88px;
      }

      .recipe-card__thumb {
        width: 88px;
        height: 88px;
      }

      .sheet-cover {
        height: 164px;
      }

      .sheet-head h2 {
        font-size: clamp(24px, 8.2vw, 32px);
      }

      .sheet-head p {
        margin-top: 8px;
        font-size: 14px;
      }

      .sheet-close {
        width: 46px;
        height: 46px;
        font-size: 26px;
      }

      .sheet-body {
        max-height: calc(100vh - 194px);
      }
    }
  </style>
</head>
<body class="is-transparent">
  <div class="page-shell">
    <div class="page-body page-stack">
      <header class="page-hero">
        <div class="topbar">
          <a href="/chat.html" class="back-link" onclick="return navigateBack(event)">返回</a>
          <a href="/chat.html" class="hero-action">咨询营养问题</a>

        <div class="recipe-summary">
          <div class="recipe-stat">

  <nav class="bottom-nav">

      <span class="nav-icon">咨</span>
      <span>咨询</span>

  <script src="/data/recipes.js"></script>
  <script>
    function navigateBack(event, fallbackUrl) {
      if (event) {
        event.preventDefault();
      }

      const fallback = fallbackUrl || '/chat.html';
      const referrer = document.referrer;
      let shouldUseHistory = false;

      if (referrer) {
        try {
          const referrerUrl = new URL(referrer);
          shouldUseHistory = referrerUrl.origin === window.location.origin;
        } catch (error) {
          // Ignore malformed referrer and fallback to default page.
        }
      }

      if (shouldUseHistory) {
        const currentUrl = window.location.href;
        window.history.back();
        window.setTimeout(function() {
          if (window.location.href === currentUrl) {
            window.location.href = fallback;
          }
        }, 220);
        return false;
      }

      window.location.href = fallback;
      return false;
    }

    const recipeQueryParamsToClear = ['recipeId', 'id', 'recipeTitle', 'title', 'recipeDesc', 'recipeCalories', 'recipeImage', 'recipeTags', 'source', 'returnTo'];
    const container = document.getElementById('recipeList');
    const noMore = document.getElementById('noMore');
    const pageSize = 16;
    let currentType = 'all';
    let loadedCount = 0;

    const recommendationRecipeAlias = {
      recipe_tomato_egg: '番茄炒蛋',
      recipe_tomato_egg_noodle: '西红柿鸡蛋面',
      recipe_broccoli_low_oil: '蒜蓉西兰花',
      recipe_tomato_tofu_soup: '番茄鸡蛋豆腐汤'
    };

    function sanitizeRecipeText(text) {
      return String(text || '').replace(/[<>"']/g, '').trim();
    }

    function normalizeRecipeText(text) {
      return sanitizeRecipeText(text)
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/[（）()·,，。、“”\-_/]/g, '');
    }

    function parseRecipeTags(rawTags) {
      if (!rawTags) return [];
      return String(rawTags)
        .split(',')
        .map(function(tag) { return sanitizeRecipeText(tag); })
        .filter(Boolean)
        .slice(0, 4);
    }

    function isLikelyImageUrl(url) {
      const value = String(url || '').trim();
      return /^https?:\/\//i.test(value) || /^data:image\//i.test(value);
    }

    function isChatReferrer() {
      if (!document.referrer) {
        return false;
      }

      try {
        const referrerUrl = new URL(document.referrer);
        return referrerUrl.origin === window.location.origin && referrerUrl.pathname === '/chat.html';
      } catch (error) {
        return false;
      }
    }

    function getRecommendationReturnUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawReturnTo = String(params.get('returnTo') || '').trim();

      if (!rawReturnTo) {
        return '/chat.html';
      }

      try {
        const parsed = new URL(rawReturnTo, window.location.origin);
        if (parsed.origin !== window.location.origin) {
          return '/chat.html';
        }
        return `${parsed.pathname}${parsed.search}${parsed.hash}` || '/chat.html';
      } catch (error) {
        return '/chat.html';
      }
    }

    function shouldCloseRecipeToChat() {
      const params = new URLSearchParams(window.location.search);
      return params.get('source') === 'chat' || isChatReferrer();
    }

    function clearRecipeRecommendationQuery() {
      const url = new URL(window.location.href);
      let changed = false;

      recipeQueryParamsToClear.forEach(function(key) {
        if (url.searchParams.has(key)) {
          url.searchParams.delete(key);
          changed = true;
        }
      });

      if (!changed) {
        return;
      }

      const nextUrl = `${url.pathname}${url.search}${url.hash}`;
      window.history.replaceState({}, '', nextUrl);
    }

    function getReusableImagePool() {
      if (!Array.isArray(recipes)) return [];
      const images = recipes
        .map(function(recipe) { return recipe && recipe.img ? String(recipe.img).trim() : ''; })
        .filter(isLikelyImageUrl);
      return Array.from(new Set(images));
    }

    function pickReusableImage(seedText) {
      const pool = getReusableImagePool();
      if (pool.length === 0) return '';
      const seed = String(seedText || 'recipe');
      let hash = 0;
      for (let i = 0; i < seed.length; i += 1) {
        hash = ((hash << 5) - hash + seed.charCodeAt(i)) | 0;
      }
      const index = Math.abs(hash) % pool.length;
      return pool[index];
    }

    function findRecipeByTitle(rawTitle) {
      const title = sanitizeRecipeText(rawTitle);
      if (!title) return null;

      const exact = recipes.find(function(recipe) {
        return recipe.name === title;
      });
      if (exact) return exact;

      const normalizedTitle = normalizeRecipeText(title);
      if (!normalizedTitle) return null;

      const fuzzy = recipes.find(function(recipe) {
        const normalizedName = normalizeRecipeText(recipe.name);
        return (
          normalizedName === normalizedTitle
          || normalizedName.includes(normalizedTitle)
          || normalizedTitle.includes(normalizedName)
        );
      });
      return fuzzy || null;
    }

    function findRecipeById(rawId) {
      const id = sanitizeRecipeText(rawId);
      if (!id) return null;

      const direct = recipes.find(function(recipe) {
        return String(recipe.id) === id;
      });
      if (direct) return direct;

      const aliasTitle = recommendationRecipeAlias[id];
      if (aliasTitle) {
        return findRecipeByTitle(aliasTitle);
      }

      return null;
    }

    function findRecipeByTags(rawTags) {
      if (!Array.isArray(recipes) || !Array.isArray(rawTags) || rawTags.length === 0) {
        return null;
      }

      const queryTags = rawTags
        .map(function(tag) { return normalizeRecipeText(tag); })
        .filter(Boolean);
      if (queryTags.length === 0) {
        return null;
      }

      let best = null;
      let bestScore = 0;

      recipes.forEach(function(recipe) {
        if (!recipe || !recipe.img) return;

        const recipeTags = Array.isArray(recipe.tags)
          ? recipe.tags.map(function(tag) { return normalizeRecipeText(tag); }).filter(Boolean)
          : [];
        const recipeName = normalizeRecipeText(recipe.name || '');
        const recipeDesc = normalizeRecipeText(recipe.desc || '');

        let score = 0;
        queryTags.forEach(function(tag) {
          if (recipeTags.includes(tag)) {
            score += 4;
            return;
          }

          if (recipeTags.some(function(recipeTag) { return recipeTag.includes(tag) || tag.includes(recipeTag); })) {
            score += 3;
          }

          if (recipeName.includes(tag) || recipeDesc.includes(tag)) {
            score += 2;
          }
        });

        if (score > bestScore) {
          bestScore = score;
          best = recipe;
        }
      });

      return bestScore > 0 ? best : null;
    }

    function buildRecipeFromQuery(params) {
      const title = sanitizeRecipeText(params.get('recipeTitle') || params.get('title') || '推荐食谱');
      const desc = sanitizeRecipeText(params.get('recipeDesc') || params.get('desc') || '根据你的健康目标推荐');
      const caloriesRaw = sanitizeRecipeText(params.get('recipeCalories') || params.get('calories') || '');
      const tags = parseRecipeTags(params.get('recipeTags') || params.get('tags'));
      const imageFromQuery = sanitizeRecipeText(params.get('recipeImage') || params.get('image') || params.get('img'));
      const referenceByTitle = findRecipeByTitle(title);
      const referenceByTags = findRecipeByTags(tags);
      const referenceRecipe = referenceByTitle || referenceByTags;
      const fallbackImage = pickReusableImage(`${title}|${tags.join('|')}`);

      return {
        id: sanitizeRecipeText(params.get('recipeId') || params.get('id') || `virtual_recipe_${Date.now()}`),
        name: title || '推荐食谱',
        desc: desc || '根据你的健康目标推荐',
        time: (referenceRecipe && referenceRecipe.time) ? referenceRecipe.time : '约20分钟',
        cal: caloriesRaw || ((referenceRecipe && referenceRecipe.cal) ? String(referenceRecipe.cal) : '--'),
        type: (referenceRecipe && referenceRecipe.type) ? referenceRecipe.type : '精选食谱',
        tags: tags.length > 0 ? tags : (
          referenceRecipe && Array.isArray(referenceRecipe.tags) && referenceRecipe.tags.length > 0
            ? referenceRecipe.tags.slice(0, 4)
            : ['为你精选']
        ),
        img: isLikelyImageUrl(imageFromQuery)
          ? imageFromQuery
          : ((referenceRecipe && isLikelyImageUrl(referenceRecipe.img)) ? referenceRecipe.img : fallbackImage),
        ingredients: (referenceRecipe && Array.isArray(referenceRecipe.ingredients) && referenceRecipe.ingredients.length > 0)
          ? referenceRecipe.ingredients
          : [
            '优先准备新鲜食材并按个人口味搭配',
            '建议少油少盐，控制调味料用量',
            '烹饪前先确认食材新鲜与适宜人群'
          ],
        steps: (referenceRecipe && Array.isArray(referenceRecipe.steps) && referenceRecipe.steps.length > 0)
          ? referenceRecipe.steps
          : [
            '将主要食材清洗、切配并提前备好辅料',
            '采用蒸、煮、炖或少油快炒的方式烹制',
            '出锅前轻调味，保持食材原味后即可食用'
          ]
      };
    }

    function resolveRecipeFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const recipeId = params.get('recipeId') || params.get('id') || '';
      const recipeTitle = params.get('recipeTitle') || params.get('title') || '';
      if (!recipeId && !recipeTitle) {
        return null;
      }

      const recipeById = findRecipeById(recipeId);
      if (recipeById) return recipeById;

      const recipeByTitle = findRecipeByTitle(recipeTitle);
      if (recipeByTitle) return recipeByTitle;

      return buildRecipeFromQuery(params);
    }

    function openRecipeFromQuery() {
      const recipe = resolveRecipeFromQuery();
      if (!recipe) return;

      window.setTimeout(function() {
        showRecipeDetail(recipe, { origin: 'query' });
      }, 0);
    }

    function buildRecipeFallbackImage(recipe) {
      const safeType = String((recipe && recipe.type) || '食谱').replace(/[<>&"]/g, '');
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#8bc46f"/>
              <stop offset="100%" stop-color="#5f9f45"/>
            </linearGradient>
          </defs>
          <rect width="320" height="320" rx="36" fill="url(#bg)"/>
          <circle cx="272" cy="44" r="48" fill="rgba(255,255,255,0.16)"/>
          <circle cx="52" cy="286" r="62" fill="rgba(255,255,255,0.12)"/>
          <rect x="24" y="24" width="84" height="30" rx="15" fill="rgba(255,255,255,0.18)"/>
          <text x="66" y="44" text-anchor="middle" font-size="14" fill="#f2ffef">${safeType}</text>
          <text x="24" y="214" font-size="34" fill="#f4ffef">TRT</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function getRecipeImageSrc(recipe) {
      return recipe && recipe.img ? recipe.img : buildRecipeFallbackImage(recipe);
    }

    function bindRecipeImageFallback(img, recipe) {
      if (!img) return;
      img.addEventListener('error', function handleError() {
        img.removeEventListener('error', handleError);
        img.src = buildRecipeFallbackImage(recipe);
      });
    }

    function getFilteredRecipes(type) {
      if (type === 'all') {
        return recipes;
      }
      return recipes.filter(function(recipe) {
        return recipe.type === type;
      });
    }

    function renderRecipes(recipeList) {
      if (loadedCount >= recipeList.length) {
        noMore.style.display = 'block';
        return;
      }

      const nextItems = recipeList.slice(loadedCount, loadedCount + pageSize);
      nextItems.forEach(function(recipe) {
        const card = document.createElement('article');
        card.className = 'recipe-card';
        card.dataset.id = recipe.id;
        card.innerHTML = `
          <div>
            <div class="recipe-card__title">${recipe.name}</div>
            <div class="recipe-card__desc">${recipe.desc}</div>
            <div class="recipe-card__meta">
              <span>${recipe.time}</span>
              <span>${recipe.cal} 千卡</span>
            </div>
            <div class="recipe-card__tags">
              ${recipe.tags.map(function(tag) {
                return `<span class="chip chip-muted">${tag}</span>`;
              }).join('')}
            </div>
          </div>
          <img class="recipe-card__thumb" src="${getRecipeImageSrc(recipe)}" alt="${recipe.name}" loading="lazy">
        `;
        const thumb = card.querySelector('.recipe-card__thumb');
        bindRecipeImageFallback(thumb, recipe);
        card.addEventListener('click', function() {
          showRecipeDetail(recipe, { origin: 'list' });
        });
        container.appendChild(card);
      });

      loadedCount += nextItems.length;
      noMore.style.display = loadedCount >= recipeList.length ? 'block' : 'none';
    }

    function filterAndRender(type) {
      currentType = type;
      loadedCount = 0;
      container.innerHTML = '';
      noMore.style.display = 'none';
      renderRecipes(getFilteredRecipes(type));
    }

    function getRecipeContent(recipe) {
      const candidate = recipe && recipe.ingredients && recipe.steps
        ? recipe
        : Object.assign({}, defaultRecipe, recipe);
      const safeTags = Array.isArray(candidate.tags) ? candidate.tags.filter(Boolean) : [];
      const safeIngredients = Array.isArray(candidate.ingredients) && candidate.ingredients.length > 0
        ? candidate.ingredients
        : defaultRecipe.ingredients;
      const safeSteps = Array.isArray(candidate.steps) && candidate.steps.length > 0
        ? candidate.steps
        : defaultRecipe.steps;

      return Object.assign({
        name: '精选食谱',
        desc: '根据你的健康目标推荐',
        time: '约20分钟',
        cal: '--',
        type: '食谱',
        tags: safeTags
      }, candidate, {
        tags: safeTags,
        ingredients: safeIngredients,
        steps: safeSteps
      });
    }

    function dismissRecipeDetail(modal, options) {
      if (!modal) return;

      const opts = options || {};
      if (opts.origin === 'query' && shouldCloseRecipeToChat()) {
        navigateBack(null, getRecommendationReturnUrl());
        return;
      }

      modal.remove();
      if (opts.origin === 'query') {
        clearRecipeRecommendationQuery();
      }
    }

    function showRecipeDetail(recipe, options) {
      const opts = options || {};
      const recipeDetail = getRecipeContent(recipe);
      const existing = document.querySelector('.sheet-overlay');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.className = 'sheet-overlay';
      modal.innerHTML = `
        <div class="sheet-card">
          <div class="sheet-cover">
            <img src="${getRecipeImageSrc(recipeDetail)}" alt="${recipeDetail.name}">
            <button class="sheet-close" aria-label="关闭" type="button">✕</button>
            <div class="sheet-head">
              <div class="chip-row">
                ${recipeDetail.tags.slice(0, 2).map(function(tag) {
                  return `<span class="chip chip-hero">${tag}</span>`;
                }).join('')}
              </div>
              <h2>${recipeDetail.name}</h2>
              <p>${recipeDetail.desc}</p>
            </div>
          </div>
          <div class="sheet-body">
            <div class="sheet-section">
              <h3>基础信息</h3>
              <div class="chip-row" style="margin-top: 12px;">
                <span class="chip chip-muted">${recipeDetail.type || '精选食谱'}</span>
                <span class="chip chip-muted">${recipeDetail.time}</span>
                <span class="chip chip-muted">${recipeDetail.cal} 千卡</span>
              </div>
            </div>
            <div class="sheet-section">
              <h3>食材清单</h3>
              <ul class="sheet-list">
                ${recipeDetail.ingredients.map(function(item) {
                  return `<li>${item}</li>`;
                }).join('')}
              </ul>
            </div>
            <div class="sheet-section">
              <h3>做法步骤</h3>
              <ol class="sheet-list step-list">
                ${recipeDetail.steps.map(function(step) {
                  return `<li>${step}</li>`;
                }).join('')}
              </ol>
            </div>
          </div>
        </div>
      `;

      document.body.appendChild(modal);
      const coverImage = modal.querySelector('.sheet-cover img');
      const closeBtn = modal.querySelector('.sheet-close');
      bindRecipeImageFallback(coverImage, recipeDetail);
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          dismissRecipeDetail(modal, opts);
        });
      }
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          dismissRecipeDetail(modal, opts);
        }
      });
    }

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(item) {
          item.classList.remove('active');
          item.classList.remove('is-active');
        });
        this.classList.add('active');
        this.classList.add('is-active');
        filterAndRender(this.dataset.type);
      });
    });

    window.addEventListener('scroll', function() {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 140) {
        renderRecipes(getFilteredRecipes(currentType));
      }
    });

    filterAndRender('all');
    openRecipeFromQuery();
  </script>
</body>
</html>
