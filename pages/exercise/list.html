  <link rel="stylesheet" href="/styles/common.css">
  <style>
    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .course-stat {
      padding: 10px 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.14);
      text-align: center;
    }

    .course-stat strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
    }

    .course-stat span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(248, 255, 246, 0.8);
    }

    .course-card {
      cursor: pointer;
    }

    .course-card .feed-media {
      aspect-ratio: 16 / 10;
    }

    .play-trigger {
      position: absolute;
      inset: 50% auto auto 50%;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: var(--brand-700);
      font-size: 20px;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .level-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .level-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand-600);
    }

    .level-dot.off {
      background: rgba(128, 143, 124, 0.24);
    }

    .video-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(12, 16, 13, 0.76);
      backdrop-filter: blur(10px);
    }

    .video-dialog {
      width: min(100%, 920px);
      overflow: hidden;
      border-radius: 20px;
      background: #0d100d;
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.34);
    }

    .video-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      color: white;
    }

    .video-header-main {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .video-header h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 600;
      word-break: break-word;
    }

    .video-clip-note {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.82);
      line-height: 1.4;
    }

    .video-clip-note strong {
      color: #ffffff;
      font-weight: 700;
    }

    .video-close {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      font-size: 16px;
      line-height: 1;
      appearance: none;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-loading {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.62);
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      line-height: 1.4;
      transition: opacity 220ms ease;
    }

    .video-loading-spinner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.28);
      border-top-color: #ffffff;
      animation: video-spin 0.9s linear infinite;
    }

    .video-frame.is-ready .video-loading {
      opacity: 0;
      pointer-events: none;
    }

    .video-frame.is-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #111814, #0f120f);
      padding: 20px;
      box-sizing: border-box;
    }

    .video-fallback {
      width: min(100%, 420px);
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed rgba(213, 230, 204, 0.28);
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: rgba(248, 255, 246, 0.92);
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
    }

    @keyframes video-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .course-grid {
        gap: 6px;
      }

      .course-stat strong {
        font-size: 15px;
      }

      .course-stat span {
        font-size: 10.5px;
      }
    }
  </style>
</head>

    function normalizeClipTitle(title) {
      const cleaned = String(title || '')
        .split('#')[0]
        .replace(/[｜|]/g, '·')
        .replace(/\s+/g, '')
        .replace(/[！!。]+$/g, '');
      return cleaned.length > 26 ? `${cleaned.slice(0, 26)}...` : cleaned;
    }

    function addGoalTypeIfMatch(goalTypes, type, titleText, patterns) {
      const matched = patterns.some(function(pattern) {
        return pattern.test(titleText);
      });
      if (matched && !goalTypes.includes(type)) {
        goalTypes.push(type);
      }
    }

    function getGoalTypesForClip(microType, sourceTitle) {
      const titleText = String(sourceTitle || '');
      const goalTypes = [];

      addGoalTypeIfMatch(goalTypes, 'goal-posture', titleText, [/体态/, /矫正/, /驼背/, /头前伸/, /圆肩/, /骨盆/, /对齐/, /回正/]);
      addGoalTypeIfMatch(goalTypes, 'goal-rehab', titleText, [/康复/, /缓解/, /恢复/, /不适/, /疼/, /劳损/, /腱鞘炎/, /间盘/]);
      addGoalTypeIfMatch(goalTypes, 'goal-relax', titleText, [/放松/, /睡前/, /助眠/, /舒缓/, /轻柔/]);
      addGoalTypeIfMatch(goalTypes, 'goal-flexibility', titleText, [/拉伸/, /柔韧/, /瑜伽/, /开龙脊/, /脊柱/, /灵活性/]);
      addGoalTypeIfMatch(goalTypes, 'goal-strength', titleText, [/力量/, /核心/, /强化/, /臀腿训练/, /能力训练/, /肩袖/]);
      addGoalTypeIfMatch(goalTypes, 'goal-cardio', titleText, [/循环/, /唤醒/, /动态/, /激活/, /能力训练/, /核心肌群能力训练/, /臀腿训练/]);

      (MICRO_GOAL_BASE_TYPES[microType] || ['goal-rehab']).forEach(function(type) {
        if (!goalTypes.includes(type)) {
          goalTypes.push(type);
        }
      });

      return goalTypes;
    }

          if (videos.length >= targetCount) {

          const durationDelta = phaseIndex === 0 ? 0 : (theme.duration >= 20 ? phaseIndex * 2 : phaseIndex);
          videos.push({
            id: `${theme.id}_${phaseIndex + 1}`,
            title: `${theme.title}·${phase}`,
            description: theme.description,
            duration: theme.duration + durationDelta,
            calories: theme.calories + phaseIndex * 18,

            poster: theme.poster,
            chips: [theme.chips[0], phase],
            mainType: theme.type,
            types: [theme.type],
            isMicro: false,
          });

    function initCardPosters() {
      document.querySelectorAll('.course-card').forEach(function(card) {
        const bvid = card.dataset.bvid;
        const poster = card.dataset.poster;
        const cardImg = card.querySelector('.card-img');
        if (!cardImg) return;

        const applyPoster = function(url) {
          cardImg.style.backgroundImage = `url('${url}')`;
        };

        const clearPoster = function() {
          cardImg.style.backgroundImage = 'none';
        };

        const tryLoad = function(url, onError) {
          const img = new Image();
          img.onload = function() {
            applyPoster(url);
          };
          img.onerror = onError;
          img.src = url;
        };

        if (poster) {
          tryLoad(getProxyPosterUrl(poster), function() {
            tryLoad(poster, function() {
              if (bvid) {
                tryLoad(getBvidPosterUrl(bvid), clearPoster);
                return;
              }
              clearPoster();
            });
          });
          return;
        }

        if (bvid) {
          tryLoad(getBvidPosterUrl(bvid), clearPoster);
          return;
        }

        clearPoster();
      });
    }

    function toPositiveNumber(value) {

    function navigateBack(fallbackUrl) {
      const fallback = fallbackUrl || '/chat.html';
      const currentUrl = window.location.href;
      const canUseHistoryBack =
        window.history
        && typeof window.history.back === 'function'
        && window.history.length > 1;

      if (canUseHistoryBack) {
        let leftCurrentPage = false;
        const markPageLeft = function() {
          leftCurrentPage = true;
        };
        window.addEventListener('pagehide', markPageLeft, { once: true });

        window.history.back();

        // In some WebView environments, history back may settle slower.
        // Delay fallback to avoid interrupting an in-flight back navigation.
        window.setTimeout(function() {
          if (!leftCurrentPage && window.location.href === currentUrl) {
            window.location.replace(fallback);
          }
        }, 900);
        return;
      }

      window.location.replace(fallback);
    }

    function isChatReferrer() {
      if (!document.referrer) {
        return false;
      }

      try {
        const referrerUrl = new URL(document.referrer);
        return referrerUrl.origin === window.location.origin && referrerUrl.pathname === '/chat.html';
      } catch (error) {
        return false;
      }
    }

    function getRecommendationReturnUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawReturnTo = String(params.get('returnTo') || '').trim();

      if (!rawReturnTo) {
        return '/chat.html';
      }

      try {
        const parsed = new URL(rawReturnTo, window.location.origin);
        if (parsed.origin !== window.location.origin) {
          return '/chat.html';
        }
        return `${parsed.pathname}${parsed.search}${parsed.hash}` || '/chat.html';
      } catch (error) {
        return '/chat.html';
      }
    }

    function shouldCloseVideoToChat() {
      const params = new URLSearchParams(window.location.search);
      return params.get('source') === 'chat' || isChatReferrer();
    }

    function clearVideoRecommendationQuery() {
      const url = new URL(window.location.href);
      let changed = false;

      videoQueryParamsToClear.forEach(function(key) {
        if (url.searchParams.has(key)) {
          url.searchParams.delete(key);
          changed = true;
        }
      });

      if (!changed) {
        return;
      }

      const nextUrl = `${url.pathname}${url.search}${url.hash}`;
      window.history.replaceState({}, '', nextUrl);
    }

    function removeVideoModal(modal) {
      if (!modal) return;
      const loadingTimer = Number(modal.dataset.loadingTimer || 0);
      if (loadingTimer > 0) {
        window.clearTimeout(loadingTimer);
      }
      modal.remove();
    }

    function dismissVideoModal(modal, options) {
      if (!modal) return;

      const opts = options || {};
      if (opts.origin === 'query' && shouldCloseVideoToChat()) {
        navigateBack(getRecommendationReturnUrl());
        return;
      }

      removeVideoModal(modal);
      if (opts.origin === 'query') {
        clearVideoRecommendationQuery();
      }
    }

    function showVideoModal(bvid, title, options) {
      if (!bvid) return;
      const opts = options || {};
      const clipSeconds = toPositiveNumber(opts.clipSeconds);
      const isMicro = Boolean(opts.isMicro) && clipSeconds > 0;

      const existing = document.querySelector('.video-modal');
      if (existing) removeVideoModal(existing);

      const modal = document.createElement('div');
      modal.className = 'video-modal';
      modal.innerHTML = `
        <div class="video-dialog">
          <div class="video-header">
            <div class="video-header-main">
              <h3>${escapeHtml(title || '视频播放')}</h3>

              <span class="video-loading-spinner" aria-hidden="true"></span>
              <span>视频加载中...</span>
            </div>
            <iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=1" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>
          </div>
        </div>
      `;

      document.body.appendChild(modal);
      const frame = modal.querySelector('.video-frame');
      const iframe = modal.querySelector('.video-frame iframe');
      const markReady = function() {
        if (frame) {
          frame.classList.add('is-ready');
        }
        const timerId = Number(modal.dataset.loadingTimer || 0);
        if (timerId > 0) {
          window.clearTimeout(timerId);
          modal.dataset.loadingTimer = '0';
        }
      };
      if (iframe) {
        iframe.addEventListener('load', markReady, { once: true });
        iframe.addEventListener('error', markReady, { once: true });
      }
      modal.dataset.loadingTimer = String(window.setTimeout(markReady, 8000));

      const closeBtn = modal.querySelector('.video-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          dismissVideoModal(modal, opts);
        });
      }

      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          dismissVideoModal(modal, opts);
        }
      });
    }

        if (!card) return;
        const isMicro = card.dataset.isMicro === '1';
        const clipSeconds = isMicro ? toPositiveNumber(card.dataset.duration) : 0;
        showVideoModal(card.dataset.bvid, card.dataset.sourceTitle || card.dataset.title || '视频播放', {
          origin: 'list',
          isMicro,
          clipSeconds,
        });
      });
    }

    const longVideos = buildLongVideos(LONG_VIDEO_COUNT);
    const microVideos = buildMicroVideos(MICRO_VIDEO_COUNT);
    const allVideos = longVideos.concat(microVideos);

    renderCourseCards(allVideos);
    initCardPosters();
    bindCourseCardClicks();

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        const nextType = this.dataset.type || 'all';
        setActiveTab(nextType);
        applyTypeFilter(nextType);
      });
    });

    setActiveTab('all');
    applyTypeFilter('all');

    (function consumeQueryBvid() {
      const params = new URLSearchParams(window.location.search);
      const bvid = params.get('bvid');
      if (!bvid) return;
      const preferMicro = isTruthyFlag(params.get('isMicro'));
      const clipSecondsFromQuery = toPositiveNumber(params.get('clipSeconds'));

      const cards = Array.from(document.querySelectorAll('.course-card')).filter(function(card) {
        return card && card.dataset && card.dataset.bvid === bvid;
      });
      if (cards.length === 0) {
        showVideoModal(bvid, '视频播放', {
          origin: 'query',
          isMicro: preferMicro,
          clipSeconds: clipSecondsFromQuery,
        });
        return;
      }

      let matched = null;
      if (preferMicro) {
        matched = cards.find(function(card) {
          if (card.dataset.isMicro !== '1') return false;
          if (clipSecondsFromQuery <= 0) return true;
          return toPositiveNumber(card.dataset.duration) === clipSecondsFromQuery;
        }) || cards.find(function(card) {
          return card.dataset.isMicro === '1';
        });
      } else {
        matched = cards.find(function(card) {
          return card.dataset.isMicro !== '1';
        });
      }

      if (!matched && clipSecondsFromQuery > 0) {
        matched = cards.find(function(card) {
          return toPositiveNumber(card.dataset.duration) === clipSecondsFromQuery;
        });
      }
      if (!matched) {
        matched = cards[0];
      }

      const title =
        (matched && (matched.dataset.sourceTitle || matched.dataset.title || matched.getAttribute('data-title'))) ||
        '视频播放';
      const isMicro = matched ? matched.dataset.isMicro === '1' : preferMicro;
      const clipSeconds = isMicro ? toPositiveNumber(matched.dataset.duration) : clipSecondsFromQuery;
      if (matched) {
        const matchedTypes = (matched.dataset.types || '').split(',').map(function(item) {
          return item.trim();
        }).filter(Boolean);
        const preferredTab = isMicro
          ? matchedTypes.find(function(type) { return type.indexOf('micro-') === 0; }) || matchedTypes.find(function(type) { return type !== 'micro'; }) || 'all'
          : matchedTypes[0] || 'all';
        setActiveTab(preferredTab);
        applyTypeFilter(preferredTab);
      }

      if (matched && typeof matched.scrollIntoView === 'function') {
        matched.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      showVideoModal(matched && matched.dataset ? matched.dataset.bvid : bvid, title, {
        origin: 'query',
        isMicro,
        clipSeconds,
      });
    })();
  </script>
</body>
</html>
