<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同仁堂元气助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/styles/common.css">
  <style>
    body {
      padding: 0;
      background: transparent;
    }
    .chat-header {
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      padding: 20px;
      border-radius: 0 0 24px 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
    }
    .chat-header h1 {
      color: white;
      text-align: left;
      margin-bottom: 4px;
      font-size: 24px;
    }
    .chat-header .subtitle {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
    }
    .status {
      text-align: center;
      padding: 10px 16px;
      margin-bottom: 12px;
      border-radius: 20px;
      font-size: 13px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .status.error {
      background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
      color: #c62828;
    }
    .status.success {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      color: #2e7d32;
    }
    .chat-container {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      margin: 0 16px;
    }
    .messages {
      height: calc(100vh - 320px);
      min-height: 350px;
      overflow-y: auto;
      padding: 20px;
      background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%);
    }
    .message {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 85%;
      line-height: 1.6;
      font-size: 15px;
      animation: messageIn 0.3s ease;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: linear-gradient(135deg, #c41e3a 0%, #d32f2f 100%);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .message.assistant {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid #f0f0f0;
    }
    .message.assistant h3 {
      font-size: 16px;
      color: #c41e3a;
      margin: 16px 0 10px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #ffebee;
    }
    .message.assistant h4 {
      font-size: 15px;
      color: #c41e3a;
      margin: 14px 0 8px 0;
    }
    .message.assistant p {
      margin: 10px 0;
    }
    .message.assistant ul, .message.assistant ol {
      margin: 10px 0;
      padding-left: 20px;
    }
    .message.assistant li {
      margin: 6px 0;
    }
    .message.assistant strong {
      color: #c41e3a;
      font-weight: 600;
    }
    .message.assistant hr {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 16px 0;
    }
    .message .scene {
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
      display: inline-block;
    }
    .message .recommendations {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid #f5f5f5;
    }
    .message .recommendations h4 {
      font-size: 13px;
      color: #c41e3a;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .message .recommendations a {
      display: block;
      padding: 12px 16px;
      margin: 8px 0;
      background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
      border-radius: 12px;
      color: #e65100;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
      border: 1px solid #ffe0b2;
    }
    .message .recommendations a:hover {
      background: linear-gradient(135deg, #ffe0b2 0%, #ffb74d 100%);
      transform: translateX(4px);
    }
    .input-area {
      display: flex;
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #f0f0f0;
      gap: 12px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    .input-area input:focus {
      border-color: #c41e3a;
      background: white;
      box-shadow: 0 0 0 4px rgba(196, 30, 58, 0.1);
    }
    .input-area input::placeholder {
      color: #bdbdbd;
    }
    .input-area button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .input-area button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(196, 30, 58, 0.4);
    }
    .input-area button:disabled {
      background: #bdbdbd;
      box-shadow: none;
      transform: none;
    }
    .quick-questions {
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      background: white;
      border-top: 1px solid #f0f0f0;
    }
    .quick-questions button {
      padding: 10px 18px;
      background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #616161;
    }
    .quick-questions button:hover {
      background: linear-gradient(135deg, #c41e3a 0%, #b71c1c 100%);
      color: white;
      border-color: #c41e3a;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .loading {
      text-align: center;
      padding: 30px 20px;
      color: #c41e3a;
      background: white;
      border-radius: 16px;
      margin: 10px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .thinking {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .thinking-text {
      font-size: 15px;
      font-weight: 500;
    }
    .thinking-dots {
      display: inline-flex;
      gap: 5px;
    }
    .thinking-dots span {
      width: 8px;
      height: 8px;
      background: #c41e3a;
      border-radius: 50%;
      animation: dotPulse 1.4s infinite ease-in-out both;
    }
    .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .thinking-steps {
      font-size: 13px;
      color: #9e9e9e;
      margin-top: 10px;
    }
    .error-msg {
      text-align: center;
      color: #c62828;
      padding: 20px;
    }
    @media (max-width: 480px) {
      .message {
        max-width: 92%;
        padding: 12px 14px;
      }
      .input-area {
        padding: 12px 16px;
      }
      .input-area button {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <h1>🏥 同仁堂元气助手</h1>
    <div class="subtitle">您的私人健康顾问</div>
  </div>
  
  <div id="status" class="status"></div>
  
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="message assistant">
        你好！我是同仁堂AI健康助手，有什么健康问题可以问我哦～
      </div>
    </div>
    
    <div class="quick-questions" id="quickQuestions">
    </div>
    
    <div class="input-area">
      <input type="text" id="input" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const API_BASE = '//localhost:3000/acp';
    let sessionId = null;

    function showStatus(msg, isError = false) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = 'status ' + (isError ? 'error' : 'success');
    }

    async function loadQuickQuestions() {
      try {
        const res = await fetch(`${API_BASE}/config/quick-questions`);
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        
        const container = document.getElementById('quickQuestions');
        data.data.forEach(q => {
          const btn = document.createElement('button');
          btn.textContent = q.question;
          btn.onclick = () => sendMessage(q.question);
          container.appendChild(btn);
        });
        showStatus('✅ 已连接到服务器');
      } catch (e) {
        console.error(e);
        showStatus('❌ 连接失败: ' + e.message, true);
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage(text) {
      const input = document.getElementById('input');
      const message = text || input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      showLoading();

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            protocol: 'acp',
            version: '1.0',
            sessionId: sessionId,
            message: { type: 'text', content: message },
            context: { userId: 'test-user' }
          })
        });

        if (!res.ok) {
          throw new Error('Network error: ' + res.status);
        }

        const data = await res.json();
        
        hideLoading();
        
        if (data.sessionId) {
          sessionId = data.sessionId;
        }
        
        if (data.error) {
          addMessage('抱歉，出了点问题：' + data.error.message, 'assistant');
        } else {
          addMessage(data.message.content, 'assistant', data.scene, data.recommendations);
        }
      } catch (e) {
        hideLoading();
        console.error('Error:', e);
        addMessage('网络错误，请检查服务器是否运行: ' + e.message, 'assistant');
      }
      
      sendBtn.disabled = false;
    }

    function addMessage(content, role, scene, recommendations) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      
      let html = '';
      if (scene && role === 'assistant') {
        const sceneNames = {
          diet: '🍽️ 饮食健康', exercise: '💪 运动健身', psychology: '🧠 心理健康',
          sleep: '😴 睡眠健康', antiaging: '✨ 抗衰养生', brand: '🏛️ 同仁堂文化',
          report: '📋 报告分析', tcm: '🌿 中医养生', chat: '💬 闲聊'
        };
        html += `<div class="scene">${sceneNames[scene] || scene}</div>`;
      }
      
      if (role === 'assistant') {
        html += marked.parse(content);
      } else {
        html += content;
      }
      
      if (recommendations && recommendations.pages && recommendations.pages.length > 0) {
        html += '<div class="recommendations"><h4>📋 为您推荐</h4>';
        recommendations.pages.forEach(p => {
          html += `<a href="${p.url}" target="_self">${p.name}</a>`;
        });
        html += '</div>';
      }
      
      div.innerHTML = html;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showLoading() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'loading';
      div.id = 'loading';
      div.innerHTML = `
        <div class="thinking">
          <span class="thinking-text">正在思考</span>
          <span class="thinking-dots">
            <span></span><span></span><span></span>
          </span>
        </div>
        <div class="thinking-steps" id="thinkingSteps">正在查阅知识库...</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      
      const steps = [
        '正在查阅知识库...',
        '正在分析问题类型...',
        '正在匹配专业内容...',
        '正在生成调理建议...',
        '即将为您解答...'
      ];
      let stepIndex = 0;
      const stepInterval = setInterval(() => {
        const stepsDiv = document.getElementById('thinkingSteps');
        if (!stepsDiv) {
          clearInterval(stepInterval);
          return;
        }
        stepIndex = (stepIndex + 1) % steps.length;
        stepsDiv.textContent = steps[stepIndex];
      }, 1500);
      
      div.dataset.stepInterval = stepInterval;
    }

    function hideLoading() {
      const loading = document.getElementById('loading');
      if (loading) {
        if (loading.dataset.stepInterval) {
          clearInterval(parseInt(loading.dataset.stepInterval));
        }
        loading.remove();
      }
    }

    loadQuickQuestions();
  </script>
</body>
</html>
